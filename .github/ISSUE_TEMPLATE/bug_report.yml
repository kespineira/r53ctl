name: Bug report
description: Report a reproducible problem with r53ctl.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not include AWS secrets, account IDs, hosted zone IDs, or private DNS names unless they are already public test values.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or steps that reproduce the issue.
      placeholder: |
        r53ctl ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: r53ctl version
      placeholder: r53ctl version
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, sanitized output, or any other useful context.
